const TAU=Math.PI*2;
function clamp(v,a,b){return v<a?a:(v>b?b:v)}
function lerp(a,b,t){return a+(b-a)*t}
function hexc(c){
  if(c[0]==='#'){const n=parseInt(c.slice(1),16);return[n>>16&255,n>>8&255,n&255]}
  const m=c.match(/(\d+)[^\d]+(\d+)[^\d]+(\d+)/);
  return m?[+m[1],+m[2],+m[3]]:[0,0,0];
}
function mix(c1,c2,t){const a=hexc(c1),b=hexc(c2);return`rgb(${Math.round(lerp(a[0],b[0],t))},${Math.round(lerp(a[1],b[1],t))},${Math.round(lerp(a[2],b[2],t))})`}

function orect(x,y,w,h,c){rect(x-1,y-1,w+2,h+2,OUT);rect(x,y,w,h,c)}
function h2(n){const v=Math.sin(n*127.1+311.7)*43758.5453;return v-Math.floor(v)}
function dither(x,y,w,h,c,inv){
  ctx.fillStyle=c;
  for(let yy=0;yy<h;yy++)for(let xx=(yy+(inv?1:0))%2;xx<w;xx+=2)
    ctx.fillRect(Math.round(x+xx),Math.round(y+yy),1,1);
}
function shadow(cx,cy,rw){
  ctx.fillStyle='rgba(20,14,26,0.35)';
  ctx.beginPath();ctx.ellipse(Math.round(cx),Math.round(cy),rw,2,0,0,TAU);ctx.fill();
}
function drawMap_(map,pal,x,y,sc,flip){
  sc=sc||1; let mw=0; for(const r of map)mw=Math.max(mw,r.length);
  for(let r=0;r<map.length;r++){
    const row=map[r];
    const y0=Math.round(y+r*sc), y1=Math.round(y+(r+1)*sc);
    for(let c=0;c<row.length;c++){
      const ch=row[c]; if(ch==='.'||ch===' ')continue;
      const col=pal[ch]; if(!col)continue;
      const cx=flip?(mw-1-c):c;
      const x0=Math.round(x+cx*sc), x1=Math.round(x+(cx+1)*sc);
      ctx.fillStyle=col;
      ctx.fillRect(x0,y0,x1-x0,y1-y0); // edge-to-edge: no gaps at fractional scales
    }
  }
}

// ---------- time & light ----------
function skyColors(){
  const t=state.time;
  const stops=[
    [0,'#0d1220','#162740'],[5,'#0d1220','#162740'],[6.5,'#f0a070','#5a4a78'],
    [8,'#7aaede','#e4f0fa'],[12,'#6ea2d8','#dcebf8'],[16.5,'#7aaede','#e2eef6'],
    [19,'#e89050','#7a4a6a'],[20.5,'#13203a','#22344e'],[24,'#0d1220','#162740']];
  for(let i=0;i<stops.length-1;i++){
    if(t>=stops[i][0]&&t<=stops[i+1][0]){
      const f=(t-stops[i][0])/(stops[i+1][0]-stops[i][0]||1);
      return[mix(stops[i][1],stops[i+1][1],f),mix(stops[i][2],stops[i+1][2],f)];
    }
  }
  return['#0c1030','#1d2448'];
}
function darkness(){
  const t=state.time;
  if(t>=8&&t<=17.5)return 0;
  if(t>17.5&&t<21)return(t-17.5)/3.5*0.62;
  if(t>=21||t<5)return 0.62;
  if(t>=5&&t<8)return(8-t)/3*0.62;
  return 0;
}
function isDark(){return darkness()>0.18}
function isDay(){return state.time>=8&&state.time<=17.5}

// ---------- placement ----------
function itemAt(p){return ITEMS.find(it=>it.id===p.id)}
function occupied(slot,gx,w,skip){
  for(const p of state.placed){
    if(p===skip)continue;
    const it=itemAt(p);
    if(it.slot!==slot)continue;
    if(gx<p.gx+it.w&&gx+w>p.gx)return true;
  }
  return false;
}
function snapCurtain(gx){
  let best=gx,bd=1e9;
  for(const wd of WIN){
    const g=Math.round((wd.x-4-INT_L)/TILE);
    const d=Math.abs(g-gx);
    if(d<bd){bd=d;best=g}
  }
  return bd<=4?best:gx;
}
function validPlace(item,gx){
  if(item.snapWindow)gx=snapCurtain(gx);
  if(gx<0||gx+item.w>COLS)return false;
  if(occupied(item.slot,gx,item.w,null))return false;
  if(item.slot==='wall'&&!item.snapWindow){
    const x0=INT_L+gx*TILE,x1=x0+item.w*TILE;
    for(const wd of WIN){if(x0<wd.x+wd.w+2&&x1>wd.x-2)return false}
  }
  if(item.snapWindow){
    const g=snapCurtain(gx);
    return gx===g&&!occupied('wall',g,item.w,null);
  }
  return true;
}
function coziness(){let c=0;for(const p of state.placed)c+=itemAt(p).cozy;return c}

       visited:state.nav.visited,gems:state.nav.gems,spark:state.nav.spark,biome:state.nav.biome}
}))}catch(e){}}

// ---------- junction ----------
function buildJunction(nodeId){
  const opts=nodeEdges(nodeId).map(ei=>({
    ei, target:otherEnd(ei,nodeId),
    label:EDGES[ei].label, type:EDGES[ei].type, biome:EDGES[ei].biome
  }));
  return {node:nodeId,opts};
}
function takeRoad(opt){
  const N=state.nav;
  N.ei=opt.ei; N.from=N.junction?N.junction.node:N.atNode;
  N.s=0; N.atNode=null; N.junction=null;
  state.drive.v=0;
  const b=EDGES[opt.ei].biome;
  if(b!==N.biome){N.biome=b;toast('Entering '+BIOMES[b].label)}
  toast(EDGES[opt.ei].label+' → '+NODES[opt.target].name);
  save();
}

// ---------- input ----------
const keys={};
function nearSeat(){return state.scene==='interior'&&state.mode==='walk'&&state.robin.x<INT_L-2}
window.addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Tab',' '].includes(e.key))e.preventDefault();
  keys[e.key.toLowerCase()]=true;
  if(e.key==='m'||e.key==='M'){state.map=!state.map;return}
  if(state.map)return;
  if(state.scene==='interior'){
    if(e.key==='b'||e.key==='B'||e.key==='Tab'){
      state.mode=state.mode==='walk'?'build':'walk';
      toast(state.mode==='build'?'Build: click place · r-click remove':'Walk mode');
    }
    if(e.key==='r'||e.key==='R')state.variant=(state.variant+1)%3;
    if((e.key==='e'||e.key==='E')&&nearSeat()){
      state.scene='drive';state.drive.v=0;
      if(state.nav.atNode)state.nav.junction=buildJunction(state.nav.atNode);
      else toast('Hold → to drive · E to park');
    } else if(state.mode==='build'){
      if(e.key==='q'||e.key==='Q')state.sel=(state.sel+ITEMS.length-1)%ITEMS.length;
      if(e.key==='e'||e.key==='E')state.sel=(state.sel+1)%ITEMS.length;
      const n=parseInt(e.key);if(n>=1&&n<=9)state.sel=n-1;
    }
  } else if(state.scene==='drive'){
    const N=state.nav;
    if(N.junction){
      const J=N.junction;
      if(J.sel===undefined)J.sel=0;
      // layout-independent digit selection (Digit1/Numpad1 codes)
      let n=NaN;
      if(/^Digit[1-9]$/.test(e.code))n=+e.code.slice(5);
      else if(/^Numpad[1-9]$/.test(e.code))n=+e.code.slice(6);
      else if(/^[1-9]$/.test(e.key))n=+e.key;
      if(n>=1&&n<=J.opts.length){takeRoad(J.opts[n-1]);return}
      if(e.key==='ArrowUp'){J.sel=(J.sel+J.opts.length-1)%J.opts.length;return}
      if(e.key==='ArrowDown'){J.sel=(J.sel+1)%J.opts.length;return}
      if(e.key==='Enter'||e.key===' '||e.key==='ArrowRight'){takeRoad(J.opts[J.sel]);return}
      if(e.key==='e'||e.key==='E'){
        state.scene='interior';state.drive.v=0;N.junction=null;save();
        toast('Parked in '+NODES[N.atNode].name+'.');
        checkSunset();
      }
      return;
    }
    if((e.key==='e'||e.key==='E')&&state.drive.v<15){
      state.scene='interior';state.drive.v=0;save();
      toast('Parked. Home sweet home.');
      checkSunset(); checkPoiPark();
    }
    if(e.key==='ArrowUp')state.drive.lane=1;
    if(e.key==='ArrowDown')state.drive.lane=0;
    if(e.key==='h'||e.key==='H'){
      state.drive.honk=0.7;
      for(const tr of state.drive.traffic)
        if(tr.kind==='tractor'&&tr.x>state.drive.trav+190&&tr.x<state.drive.trav+360)tr.pull=2.2;
    }
  }
});

screenCv.addEventListener('mousemove',e=>{

screenCv.addEventListener('mousedown',e=>{
  // junction: click an option (native UI coords)
  if(state.scene==='drive'&&state.nav.junction&&e.button===0){
    const J=state.nav.junction;
    const px=NW/2-184, py=64;
    for(let i=0;i<J.opts.length;i++){
      if(state.mx>=px&&state.mx<=px+368&&state.my>=py+32+i*28&&state.my<py+58+i*28){
        takeRoad(J.opts[i]);return;
      }
    }
    return;
  }
  if(state.scene!=='interior'||state.mode!=='build'||state.map)return;
  const item=ITEMS[state.sel];
  const lx=state.mx/2, ly=state.my/2; // logical world coords
  if(e.button===2){
    for(let i=state.placed.length-1;i>=0;i--){
      const p=state.placed[i],it=itemAt(p);
      const x0=INT_L+p.gx*TILE,x1=x0+it.w*TILE;
      let y0,y1;
      if(it.slot==='floor'||it.slot==='rug'){y0=FLOOR-36;y1=FLOOR+3}
      else if(it.slot==='wall'){y0=58;y1=104}
      else{y0=56;y1=76}
      if(lx>=x0&&lx<x1&&ly>=y0&&ly<=y1){
        state.placed.splice(i,1);save();toast('Removed '+it.name);checkMilestone();return;
      }
    }
    return;
  }
  if(e.button===0){
    if(state.my>NH-76){
      const idx=Math.floor((state.mx-4)/36);
      if(idx>=0&&idx<ITEMS.length)state.sel=idx;
      return;
    }
    let gx=Math.floor((lx-INT_L)/TILE-(item.w-1)/2+0.5);
    if(item.snapWindow)gx=snapCurtain(gx);
    if(validPlace(item,gx)){
      state.placed.push({id:item.id,gx,variant:state.variant});
      save();checkMilestone();
    }
  }
});
function checkMilestone(){
  const c=coziness();let m=-1;
  for(let i=0;i<MILESTONES.length;i++)if(c>=MILESTONES[i][0])m=i;
  if(m>state.lastMilestone&&state.lastMilestone>=0)toast(MILESTONES[m][1]);
  state.lastMilestone=m;
}

  if(state.time>18.6&&state.time<20.6&&state.nav.sunsetAt!==Math.floor(state.drive.trav/500)){
    state.nav.sunsetAt=Math.floor(state.drive.trav/500);
    state.nav.spark+=3;
    toast('Golden hour. Worth every detour. ✦+3');
    save();
  }
}
function checkPoiPark(){
  const N=state.nav;
  for(const p of poisFor(N.ei)){
    const d=poiD(p);
    if(Math.abs(d-(N.s+130))<70){
      const key=N.ei+':'+p.kind;
      if(p.kind==='gem'&&!N.gems[key+':camped']){
        N.gems[key+':camped']=1;N.spark+=4;
        toast('Camped at a hidden spot. ✦+4');save();
      }
      if(p.kind==='brokenvan'&&!N.gems[key+':helped']){
        N.gems[key+':helped']=1;N.spark+=10;
        toast('You fixed their alternator. New friends! ✦+10');save();
      }
    }
  }
}

// ---------- update ----------
let last=performance.now();
function update(dt){
  state.time=(state.time+dt*24/300)%24;
  if(state.map)return;
  if(state.scene==='interior'){
    const r=state.robin;
    r.walking=false;
    if(state.mode==='walk'){
      const sp=40;
      if(keys['arrowleft']||keys['a']){r.x-=sp*dt;r.dir=-1;r.walking=true}
      if(keys['arrowright']||keys['d']){r.x+=sp*dt;r.dir=1;r.walking=true}
      r.x=clamp(r.x,INT_L-12,INT_R-18);
    }
    if(r.walking)r.frame+=dt*8;
    const c=state.cat;
    c.t-=dt;
    const petbed=state.placed.find(p=>p.id==='petbed');
    if(isDark()&&petbed){c.st='sleep';c.target=INT_L+petbed.gx*TILE}
    else if(c.t<=0){
      c.st=Math.random()<0.4?'sit':'wander';
      c.target=INT_L+4+Math.random()*(INT_R-INT_L-26);
      c.t=2+Math.random()*5;
    }
    if(c.st!=='sit'){
      const d=c.target-c.x;
      if(Math.abs(d)>2){c.x+=Math.sign(d)*18*dt;c.dir=Math.sign(d)}
    }
  } else {
    const D=state.drive, N=state.nav, e=curEdge();
    if(N.junction){D.v=0;return}
    const maxV=D.fuel>0?380:50;
    if(keys['arrowright']||keys['d'])D.v=Math.min(maxV,D.v+150*dt);
    else if(keys['arrowleft']||keys['a'])D.v=Math.max(0,D.v-320*dt);
    else D.v=Math.max(0,D.v-40*dt);
    const prevS=N.s;
    N.s+=D.v*dt; D.trav+=D.v*dt;
    D.shake=Math.max(0,D.shake-dt*1.4);
    D.honk=Math.max(0,D.honk-dt);
    // fuel
    D.fuel=Math.max(0,D.fuel-D.v*dt*0.045);
    if(D.fuel<20&&!D.lowFuelWarned){D.lowFuelWarned=true;toast('Low fuel! Find a station or a town.')}
    if(D.fuel>25)D.lowFuelWarned=false;
    if(D.fuel<=0&&D.v<5){
      D.fuel=30;D.shake=0.3;
      toast('Big Sal brought a jerry can. "No worries, kid."');
      save();
    }
    // POIs
    for(const p of poisFor(N.ei)){
      const d=poiD(p), key=N.ei+':'+p.kind;
      if(p.kind==='station'&&Math.abs((N.s+190)-d)<55&&D.v<8&&D.fuel<98){
        D.fuel=Math.min(100,D.fuel+28*dt);
        if(performance.now()-D.refuelToast>6000){D.refuelToast=performance.now();toast('Filling the tank…')}
      }
      if(p.kind==='gem'&&prevS+190<d&&N.s+190>=d&&!N.gems[key]){
        N.gems[key]=1;N.spark+=5;
        toast('Secret campsite discovered! ✦+5');save();
      }
      if(p.kind==='brokenvan'&&prevS+190<d&&N.s+190>=d&&!N.gems[key+':helped']){
        toast('A broken-down van… pull over to help? (E)');
      }
    }
    // traffic
    if(D.trav>D.spawnAt){
      const dense=e.type==='fast'?1:(e.type==='scenic'?0.7:0.5);
      D.spawnAt=D.trav+(170+h2(D.trav)*260)/dense;
      const roll=h2(D.trav*1.7);
      if(roll<0.42){
        D.traffic.push({x:D.trav+480,v:-(140+h2(D.trav*3)*120),lane:1,kind:'car',
          col:['#c8503a','#4f7ab0','#dcae44','#7cb05e','#8a8aa0'][Math.floor(h2(D.trav*5)*5)]});
      } else if(roll<0.62){
        D.traffic.push({x:D.trav+460,v:55,lane:0,kind:h2(D.trav*7)<0.5?'tractor':'car',
          col:['#7cb05e','#c8503a','#8a8aa0'][Math.floor(h2(D.trav*9)*3)],slow:true});
      }
    }
    for(const tr of D.traffic){
      tr.x+=tr.v*dt;
      if(tr.pull)tr.pull=Math.max(0,tr.pull-dt);
    }
    D.traffic=D.traffic.filter(tr=>tr.x>D.trav-140&&tr.x<D.trav+700);
    for(const tr of D.traffic){
      const sx=tr.x-D.trav;
      const eLane=tr.pull?-1:tr.lane;
      if(eLane===D.lane&&sx>60&&sx<205){
        if(tr.lane===1&&tr.v<0){
          D.v=Math.min(D.v,25);D.lane=0;D.shake=0.8;
          if(performance.now()-D.bumpToastAt>3000){D.bumpToastAt=performance.now();toast('YIKES! Eyes on the road!')}
        } else if(tr.slow&&sx>165&&D.v>tr.v){
          D.v=tr.v;
          if(performance.now()-D.bumpToastAt>5000){D.bumpToastAt=performance.now();toast('Stuck behind traffic… overtake! (↑)')}
        }
      }
    }
    // deer (more on adventure roads)
    const deerGap=e.type==='adventure'?900:1600;
    if(!D.deer&&D.trav>D.deerAt){
      D.deer={x:D.trav+340,t:3.2};
      toast('! Something on the road ahead !');
    }
    if(D.deer){
      D.deer.t-=dt;
      const dx=D.deer.x-(D.trav+190);
      if(dx<10&&dx>-20&&D.deer.t>0.4&&D.v>45){
        D.v=0;D.shake=1;D.deer.t=Math.min(D.deer.t,0.5);
        toast('PHEW! Emergency stop. The deer nods politely.');
      }
      if(D.deer.t<=0){D.deer=null;D.deerAt=D.trav+deerGap+h2(D.trav)*1200}
    }
    // arrival
    if(N.s>=e.len){
      N.s=e.len;D.v=0;
      const node=curTarget();
      N.atNode=node;
      if(!N.visited[node]){
        N.visited[node]=1;
        N.spark+=NODES[node].kind==='city'?5:3;
        toast('Welcome to '+NODES[node].name+'! ✦');
      } else toast(NODES[node].name+' again. Like coming home.');
      if(NODES[node].kind==='city'&&D.fuel<95){D.fuel=100;toast('Topped up in town.')}
      N.junction=buildJunction(node);
      save();
    }
  }
  for(const tt of state.toasts)tt.t-=dt;
  state.toasts=state.toasts.filter(tt=>tt.t>0);
}

function pine(x,base,h,col,colL){
  // soft fir: hue-tinted shadow instead of hard outline (coherent with painterly bg)
  const j=h2(x*7.13);
  const sh=mix(col,'#10141e',0.5);
  ctx.fillStyle=MN.bark;
  ctx.fillRect(Math.round(x)-1,base-5,3,6);
  const L=4;
  for(let i=0;i<L;i++){
    const f=i/(L-1);
    const w=h*(0.40-0.27*f), ry=h*0.13, cy=base-6-h*0.78*f-h*0.08;
    const jx=(h2(x*3.7+i*13)-0.5)*w*0.5;
    ctx.fillStyle=sh;
    ctx.beginPath();ctx.ellipse(x+jx*0.4+0.8,cy+1.2,w+0.8,ry+0.8,0,0,TAU);ctx.fill();
    ctx.fillStyle=col;
    ctx.beginPath();ctx.ellipse(x+jx*0.4,cy,w,ry,0,0,TAU);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+jx,cy+1,w*0.8,ry*0.9,0,0,TAU);ctx.fill();
    ctx.fillStyle=colL;
    ctx.beginPath();ctx.ellipse(x+jx*0.4-w*0.30,cy-ry*0.45,w*0.38,ry*0.40,0,0,TAU);ctx.fill();
  }
  ctx.fillStyle=sh;
  ctx.beginPath();ctx.moveTo(x-2,base-6-h*0.79);ctx.lineTo(x+(j-0.5)*2+0.6,base-6-h*1.0);ctx.lineTo(x+2.6,base-6-h*0.79);ctx.fill();
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(x-1.5,base-6-h*0.80);ctx.lineTo(x+(j-0.5)*2,base-6-h*0.99);ctx.lineTo(x+1.5,base-6-h*0.80);ctx.fill();
  ctx.fillStyle=colL;
  ctx.fillRect(Math.round(x-1),Math.round(base-6-h*0.92),1,2);
}

function drawProp(kind,x,base,k,dk,t){

   case 'olive':{

    break;}
   case 'windmill':{
    if(k%5){const G=mix('#5c8c4c','#1a2430',dk);ctx.fillStyle=G;ctx.fillRect(Math.round(x)-5,base-7,10,7);break}
    const B=mix('#8a7458','#221e2a',dk),Bl=mix('#a89478','#2e2a38',dk);
    ctx.fillStyle=B;
    ctx.fillRect(Math.round(x)-5,base-26,10,26);
    ctx.fillStyle=Bl;ctx.fillRect(Math.round(x)-5,base-26,3,26);
    ctx.fillStyle=mix('#5a4a3c','#181420',dk);ctx.fillRect(Math.round(x)-6,base-30,12,5);
    const an=t*0.9+k;
    ctx.strokeStyle=mix('#e8e0cc','#3c3848',dk);ctx.lineWidth=2;
    for(let b=0;b<4;b++){
      const a2=an+b*TAU/4;
      ctx.beginPath();ctx.moveTo(x,base-28);
      ctx.lineTo(x+Math.cos(a2)*13,base-28+Math.sin(a2)*13);ctx.stroke();
    }
    break;}
   case 'cypress':{
    const G=mix('#3a5c34','#141e2a',dk),Gl=mix('#54784a','#1e2a38',dk);
    ctx.fillStyle='#5a4630';ctx.fillRect(Math.round(x),base-3,2,4);
    ctx.fillStyle=G;
    ctx.fillRect(Math.round(x)-2,base-22,6,19);
    ctx.fillRect(Math.round(x)-1,base-25,4,4);
    ctx.fillStyle=Gl;ctx.fillRect(Math.round(x)-2,base-22,2,17);
    break;}
  }
}

  orect(276,112,10,14,P.orange);rect(277,113,3,12,P.orangeL);rect(278,110,5,3,P.orangeD);
  orect(HOLE_R-2,VBOT-4,VX1-HOLE_R+4,5,'#2c3038');

  for(const wx of [80,246]){
    ctx.fillStyle=OUT;ctx.beginPath();ctx.arc(wx,VBOT+2,17,Math.PI,TAU);ctx.fill();
    ctx.fillStyle=P.clad;ctx.beginPath();ctx.arc(wx,VBOT+2,15,Math.PI,TAU);ctx.fill();
    ctx.fillStyle='#15171b';ctx.beginPath();ctx.arc(wx,141,13,0,TAU);ctx.fill();
    ctx.fillStyle='#23262c';ctx.beginPath();ctx.arc(wx,141,11,0,TAU);ctx.fill();
    ctx.fillStyle='#15171b';
    for(let a=0;a<10;a++){
      const an=a/10*TAU+0.3;
      ctx.fillRect(Math.round(wx+Math.cos(an)*12)-1,Math.round(141+Math.sin(an)*12)-1,3,3);
    }
    ctx.fillStyle='#c8ccd0';ctx.beginPath();ctx.arc(wx,141,4,0,TAU);ctx.fill();
    ctx.fillStyle=P.orange;ctx.beginPath();ctx.arc(wx,141,2,0,TAU);ctx.fill();
    ctx.fillStyle='#7e888e';
    for(let a=0;a<5;a++){
      const an=a/5*TAU;
      ctx.fillRect(Math.round(wx+Math.cos(an)*3),Math.round(141+Math.sin(an)*3),1,1);
    }
  }
  rect(HOLE_L,134,HOLE_R-HOLE_L,4,'#15171b');
  rect(100,136,120,2,'#23262c');

  if(isDay()&&state.weather==='clear'){
    ctx.globalCompositeOperation='lighter';
    for(const wd of WIN){
      const g=ctx.createLinearGradient(wd.x,WIN_Y,wd.x-14,WALL_BOT+12);
      g.addColorStop(0,'rgba(255,236,170,0.15)');g.addColorStop(1,'rgba(255,236,170,0)');
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.moveTo(wd.x,WIN_Y);ctx.lineTo(wd.x+wd.w,WIN_Y);
      ctx.lineTo(wd.x+wd.w-16,134);ctx.lineTo(wd.x-16,134);
      ctx.closePath();ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
  }

  const lights=[];
  const order={rug:0,floor:1,wall:1,ceiling:2};
  const sorted=[...state.placed].sort((a,b)=>order[itemAt(a).slot]-order[itemAt(b).slot]);
  for(const p of sorted){
    const it=itemAt(p);
    const x=INT_L+p.gx*TILE;
    let y;
    if(it.slot==='floor'||it.slot==='rug')y=FLOOR;
    else if(it.slot==='wall')y=it.snapWindow?WIN_Y-4:WALL_Y;
    else y=CUB_B;
    it.draw(x,y,p.variant||0,t);
    if(it.light&&isDark()&&it.lightAt)lights.push(it.lightAt(x,y));
  }
  if(isDark())lights.push({x:152,y:CUB_B+2,r:42},{x:232,y:CUB_B+2,r:42});

  const c=state.cat;
  shadow(c.x+8,FLOOR+1,6);
  if(c.st==='sleep')drawMap_(CAT_SLEEP,CAT_PAL,c.x,FLOOR-9,1,c.dir<0);
  else drawMap_(CAT_WALK,CAT_PAL,c.x,FLOOR-10,1,c.dir<0);

  const r=state.robin;
  shadow(r.x+14,FLOOR+1,9);
  const map=(r.walking&&Math.floor(r.frame)%2===0)?ROBIN_WALK:ROBIN_STAND;
  drawMap_(map,ROBIN_PAL,r.x,FLOOR-42,2,r.dir<0);

  if(state.mode==='build'&&state.mouseIn&&state.my<=NH-76){
    const item=ITEMS[state.sel];
    let gx=Math.floor((state.mx/2-INT_L)/TILE-(item.w-1)/2+0.5);
    if(item.snapWindow)gx=snapCurtain(gx);
    const ok=validPlace(item,gx);
    const x=INT_L+gx*TILE;
    let y=item.slot==='wall'?(item.snapWindow?WIN_Y-4:WALL_Y):(item.slot==='ceiling'?CUB_B:FLOOR);
    ctx.globalAlpha=0.7;item.draw(x,y,state.variant,t);ctx.globalAlpha=1;
    ctx.fillStyle=ok?'rgba(130,220,150,0.22)':'rgba(230,90,90,0.28)';
    const gh=item.slot==='wall'?(item.snapWindow?44:40):(item.slot==='ceiling'?14:38);
    const gy=item.slot==='wall'?(item.snapWindow?WIN_Y-8:WALL_Y-4):(item.slot==='ceiling'?CUB_B:FLOOR-35);
    ctx.fillRect(x,gy,item.w*TILE,gh);
  }

  return lights;
}

// ---------- render: drive ----------
function renderDrive(t){
  const D=state.drive, N=state.nav, e=curEdge();
  drawSky(t);
  const dk=darkness()/0.62;
  // POIs stand on the grass line
  for(const p of poisFor(N.ei)){
    const d=poiD(p), sx=Math.round(d-N.s);
    if(sx<-90||sx>W+60)continue;
    if(p.kind==='station')drawStation(sx,GY,dk);
    if(p.kind==='gem')drawGem(sx,GY,dk,dk>0.3);
    if(p.kind==='brokenvan'&&!N.gems[N.ei+':brokenvan:helped'])drawBrokenVan(sx,GY,dk);
  }
  for(const tr of D.traffic){
    if(tr.lane!==1)continue;
    const sx=Math.round(tr.x-D.trav);
    if(sx<-40||sx>W+40)continue;
    if(tr.kind==='tractor')drawTractor(sx,140,tr.col);
    else drawCar(sx,140,tr.col,tr.v<0?-1:1);
  }
  if(D.deer){
    const sx=Math.round(D.deer.x-D.trav);
    if(sx>-30&&sx<W+30)drawDeer(sx,145,t);
  }
  const laneY=D.lane===1?140:146;
  drawVanHero(64,laneY,t);
  if(D.honk>0){
    ctx.fillStyle=`rgba(246,195,74,${Math.min(1,D.honk*2)})`;
    ctx.font='8px monospace';
    ctx.fillText('♪ BEEP',176,82-Math.round((0.7-D.honk)*14));
  }
  for(const tr of D.traffic){
    if(tr.lane!==0)continue;
    const sx=Math.round(tr.x-D.trav);
    if(sx<-40||sx>W+40)continue;
    const py=tr.pull?149:146;
    if(tr.kind==='tractor')drawTractor(sx,py,tr.col);
    else drawCar(sx,py,tr.col,1);
  }

  const lights=[];
  if(isDark()){
    lights.push({x:190,y:126,r:55},{x:115,y:104,r:20},{x:140,y:104,r:20});
    for(const p of poisFor(N.ei)){
      const d=poiD(p), sx=Math.round(d-N.s);
      if(sx>-80&&sx<W+40&&p.kind==='station')lights.push({x:sx+17,y:116,r:40});
      if(sx>-80&&sx<W+40&&p.kind==='gem')lights.push({x:sx+4,y:126,r:24});
    }
    for(const tr of D.traffic){
      const sx=Math.round(tr.x-D.trav);
      if(sx>-40&&sx<W+40)lights.push({x:tr.v<0?sx-4:sx+28,y:tr.lane?130:136,r:22});
    }
  }
  return lights;
}

function applyLighting(lights){ // native-res post-process (HD)
  const dk=darkness();
  if(dk>0){
    lctx.clearRect(0,0,NW,NH);
    lctx.fillStyle=`rgba(13,18,32,${dk})`; // MN navy night
    lctx.fillRect(0,0,NW,NH);
    lctx.globalCompositeOperation='destination-out';
    for(const L of lights){
      const g=lctx.createRadialGradient(L.x*2,L.y*2,4,L.x*2,L.y*2,L.r*2);
      g.addColorStop(0,'rgba(0,0,0,0.95)');g.addColorStop(1,'rgba(0,0,0,0)');
      lctx.fillStyle=g;lctx.beginPath();lctx.arc(L.x*2,L.y*2,L.r*2,0,TAU);lctx.fill();
    }
    lctx.globalCompositeOperation='source-over';
    ctx.drawImage(lightCv,0,0);
    ctx.globalCompositeOperation='lighter';
    for(const L of lights){
      const g=ctx.createRadialGradient(L.x*2,L.y*2,2,L.x*2,L.y*2,L.r*1.4);
      g.addColorStop(0,'rgba(255,190,90,0.20)');g.addColorStop(1,'rgba(255,150,60,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(L.x*2,L.y*2,L.r*1.4,0,TAU);ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
  }
  // golden hour grade
  const tt=state.time;
  let gh=0;
  if(tt>17.2&&tt<20.2)gh=1-Math.abs(tt-18.7)/1.5;
  if(tt>6&&tt<8)gh=(1-Math.abs(tt-7)/1)*0.7;
  gh=Math.max(0,gh);
  if(gh>0){
    ctx.globalCompositeOperation='multiply';
    ctx.fillStyle=`rgba(255,196,140,${0.28*gh})`;
    ctx.fillRect(0,0,NW,NH);
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle=`rgba(255,120,40,${0.07*gh})`;
    ctx.fillRect(0,0,NW,NH);
    ctx.globalCompositeOperation='source-over';
  }
  // permanent Eastward split-tone: warm lights, cool shadows
  ctx.globalCompositeOperation='overlay';
  ctx.fillStyle='rgba(255,150,60,0.10)';
  ctx.fillRect(0,0,NW,NH);
  ctx.globalCompositeOperation='multiply';
  ctx.fillStyle='rgba(196,206,255,0.10)';
  ctx.fillRect(0,0,NW,NH);
  ctx.globalCompositeOperation='source-over';
  // fine film grain
  for(let i=0;i<360;i++){
    const gx=(Math.random()*NW)|0, gy=(Math.random()*NH)|0;
    ctx.fillStyle=i%2?'rgba(255,255,255,0.028)':'rgba(0,0,0,0.032)';
    ctx.fillRect(gx,gy,1,1);
  }
  const vg=ctx.createRadialGradient(NW/2,NH/2-16,172,NW/2,NH/2,430);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(24,12,28,0.34)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,NW,NH);
}

// ---------- map screen (native HD) ----------
function renderMapScreen(){
  ctx.fillStyle='rgba(13,18,32,0.95)';ctx.fillRect(0,0,NW,NH);
  ctx.strokeStyle='rgba(212,160,64,0.6)';ctx.lineWidth=2;
  ctx.strokeRect(8,8,NW-16,NH-16);
  ctx.font='13px monospace';ctx.textBaseline='top';
  ctx.fillStyle=MN.hudGold;ctx.fillText('· MARE EUROPAEUM ·',24,44);
  ctx.fillStyle=MN.crystalGlow;ctx.fillText('✦ '+state.nav.spark,NW-100,44);
  ctx.fillStyle='rgba(60,90,140,0.18)';
  for(let i=0;i<120;i++)ctx.fillRect((i*37)%NW,(i*53)%NH,3,2);
  const BCOL={iberia:'#c2a45c',mediterranean:'#4aa8c8',france:'#7cb05e',lowlands:'#9ccb7a',
              central:'#3e7c36',alps:'#cfd8e0',italy:'#a0b860'};
  for(let i=0;i<EDGES.length;i++){
    const e=EDGES[i],A=NODES[e.a],B=NODES[e.b];
    ctx.strokeStyle=BCOL[e.biome];
    ctx.lineWidth=i===state.nav.ei?4:2;
    ctx.globalAlpha=i===state.nav.ei?1:0.7;
    ctx.beginPath();ctx.moveTo(A.mx*2,A.my*2);ctx.lineTo(B.mx*2,B.my*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  for(const id in NODES){
    const n=NODES[id];
    const vis=state.nav.visited[id];
    if(n.kind==='city'){
      ctx.fillStyle=vis?'#ee7c2e':'#5a647c';
      ctx.fillRect(n.mx*2-4,n.my*2-4,8,8);
      ctx.fillStyle=vis?'#f2dfc0':'#7e88a0';
      ctx.fillText(n.name,n.mx*2+10,n.my*2-6);
    } else {
      ctx.fillStyle=vis?'#9ccb7a':'#4a5468';
      ctx.beginPath();ctx.moveTo(n.mx*2,n.my*2-6);ctx.lineTo(n.mx*2+6,n.my*2+4);ctx.lineTo(n.mx*2-6,n.my*2+4);ctx.fill();
      if(vis){ctx.fillStyle='#9ccb7a';ctx.fillText(n.name.replace(' Camp',''),n.mx*2+10,n.my*2-6)}
    }
  }
  const N=state.nav,e=curEdge();
  let px,py;
  if(N.atNode){px=NODES[N.atNode].mx;py=NODES[N.atNode].my}
  else{
    const A=NODES[N.from],B=NODES[curTarget()],f=N.s/e.len;
    px=lerp(A.mx,B.mx,f);py=lerp(A.my,B.my,f);
  }
  if(Math.sin(performance.now()/180)>0){
    ctx.fillStyle='#fff';ctx.fillRect(Math.round(px*2)-4,Math.round(py*2)-4,8,8);
    ctx.fillStyle='#ee7c2e';ctx.fillRect(Math.round(px*2)-2,Math.round(py*2)-2,4,4);
  }
  ctx.fillStyle='#7e88a0';
  ctx.fillText('■ city  ▲ camp  · you are the blink',24,NH-26);
  ctx.fillStyle='#c4b8a6';ctx.fillText('M close',NW-92,NH-26);
}

// ---------- UI ----------
function chip(x,y,w,h){
  // Mare Nostrum HUD: deep navy panel, gold border
  ctx.fillStyle='rgba(13,18,32,0.92)';
  ctx.fillRect(x+1,y,w-2,h);ctx.fillRect(x,y+1,w,h-2);
  ctx.strokeStyle='rgba(212,160,64,0.35)';ctx.lineWidth=1;
  ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
}
function fmtTime(){
  let hh=Math.floor(state.time),mm=Math.floor((state.time-hh)*60);
  const ap=hh>=12?'pm':'am';let h12=hh%12;if(h12===0)h12=12;
  return h12+':'+String(mm).padStart(2,'0')+ap;
}
function drawUI(t){ // native HD UI
  ctx.font='13px monospace';ctx.textBaseline='top';
  chip(6,6,330,24);
  ctx.fillStyle='#f2dfc0';ctx.fillText('WAYHOME',16,11);
  ctx.fillStyle='#8fd8e8';ctx.fillText('Poppy',116,11);
  ctx.fillStyle='#f2dfc0';ctx.fillText(fmtTime()+(state.weather==='rain'?' ~':''),184,11);
  ctx.fillStyle='#8fd8e8';ctx.fillText('✦'+state.nav.spark,278,11);
  const cz=coziness();
  let label='';for(const m of MILESTONES)if(cz>=m[0])label=m[1];
  const txt='♥'+cz+' '+label;
  const tw=ctx.measureText(txt).width+20;
  chip(NW-tw-6,6,tw,24);
  ctx.fillStyle='#f2a0b0';ctx.fillText('♥'+cz,NW-tw+4,11);
  ctx.fillStyle='#e8d8be';ctx.fillText(label,NW-tw+4+ctx.measureText('♥'+cz+' ').width,11);

  if(state.map)return;

  if(state.scene==='drive'){
    const D=state.drive,N=state.nav,e=curEdge();
    if(N.junction){
      const J=N.junction;
      // modal: dim the world so the panel never fights the scene
      ctx.fillStyle='rgba(8,12,22,0.45)';ctx.fillRect(0,0,NW,NH);
      const ph=60+J.opts.length*28;
      const px=NW/2-184, py=64;
      ctx.fillStyle='rgba(13,18,32,0.96)';ctx.fillRect(px,py,368,ph);
      ctx.fillStyle='rgba(238,124,46,0.6)';ctx.fillRect(px,py,368,2);
      ctx.fillStyle='#f6c34a';
      ctx.fillText(NODES[J.node].name.toUpperCase()+' — pick a road',px+16,py+10);
      const sel=J.sel||0;
      for(let i=0;i<J.opts.length;i++){
        const o=J.opts[i];
        if(i===sel){ctx.fillStyle='rgba(238,124,46,0.22)';ctx.fillRect(px+8,py+32+i*28,352,24)}
        ctx.fillStyle=i===sel?'#ffd97a':'#f2dfc0';
        ctx.fillText((i===sel?'▸ ':'  ')+o.label+' → '+NODES[o.target].name,px+16,py+37+i*28);
        ctx.fillStyle=TYPE_COL[o.type];
        ctx.fillText(o.type,px+16+ctx.measureText('▸ '+o.label+' → '+NODES[o.target].name).width+10,py+37+i*28);
      }
      ctx.fillStyle='#c4b8a6';
      ctx.fillText('↑↓ + Enter · or click · E park · M map',px+16,py+ph-22);
    } else {
      const kmh=Math.round(D.v/380*120);
      const km=Math.round(D.trav/KM);
      const rem=Math.max(0,Math.round((e.len-N.s)/KM));
      let s=kmh+' km/h · '+km+' km · '+NODES[curTarget()].name+' in '+rem+' km';
      const w2=ctx.measureText(s).width+24;
      chip(6,NH-28,w2,22);
      ctx.fillStyle='#c4e0b6';ctx.fillText(s,18,NH-23);
      chip(6,NH-56,104,24);
      ctx.fillStyle='#c4b8a6';ctx.fillText('F',16,NH-50);
      rect(32,NH-49,68,10,'#15171b');
      const fw=Math.round(68*D.fuel/100);
      const fcol=D.fuel>40?'#7adc7a':(D.fuel>18?'#f6c34a':(Math.sin(performance.now()/150)>0?'#e83a28':'#8a2018'));
      rect(32,NH-49,fw,10,fcol);
      chip(116,NH-56,150,24);
      ctx.fillStyle=TYPE_COL[e.type];ctx.fillText(e.type+' route',126,NH-50);
      if(D.v<15){
        const hint='→ drive · ↑↓ lane · H honk · E park';
        const w3=ctx.measureText(hint).width+20;
        chip(NW-w3-6,NH-28,w3,22);
        ctx.fillStyle='#c4b8a6';ctx.fillText(hint,NW-w3+4,NH-23);
      }
    }
  } else if(state.mode==='build'){
    ctx.fillStyle='rgba(22,16,28,0.93)';ctx.fillRect(0,NH-76,NW,76);
    ctx.fillStyle='rgba(238,124,46,0.4)';ctx.fillRect(0,NH-76,NW,2);
    for(let i=0;i<ITEMS.length;i++){
      const x=4+i*36,y=NH-70;
      ctx.fillStyle=i===state.sel?'rgba(238,124,46,0.25)':'rgba(255,255,255,0.05)';
      ctx.fillRect(x,y,34,48);
      if(i===state.sel){ctx.strokeStyle='#ee7c2e';ctx.lineWidth=2;ctx.strokeRect(x+1,y+1,32,46)}
      const it=ITEMS[i];
      ctx.save();
      ctx.beginPath();ctx.rect(x+2,y+2,30,44);ctx.clip();
      const iw=it.w*TILE;
      const sc=Math.min(0.75,14/iw)*2;
      ctx.translate(x+17,y+44);ctx.scale(sc,sc);ctx.translate(-iw/2,0);
      if(it.slot==='wall')ctx.translate(0,-34);
      if(it.slot==='ceiling')ctx.translate(0,-16);
      it.draw(0,0,state.variant,t);
      ctx.restore();
    }
    ctx.fillStyle='#cfc2ae';
    ctx.fillText(ITEMS[state.sel].name+' · R color · Q/E item · rclick del',8,NH-20);
  } else {
    chip(6,NH-28,400,22);
    ctx.fillStyle='#c4b8a6';
    ctx.fillText('arrows walk · B build · M map · W rain · [/]',14,NH-23);
    if(nearSeat()){
      const hint='E — drive';
      const w3=ctx.measureText(hint).width+20;
      chip(NW-w3-6,NH-28,w3,22);
      ctx.fillStyle='#f6c34a';ctx.fillText(hint,NW-w3+4,NH-23);
    }
  }
  if(state.nav.atNode&&!state.map){
    const s=(state.scene==='interior'?'parked: ':'')+NODES[state.nav.atNode].name;
    const bw=ctx.measureText(s).width+28;
    chip(NW/2-bw/2,36,bw,24);
    ctx.fillStyle='#f6c34a';ctx.fillText(s,NW/2-bw/2+14,42);
  }
  if(state.scene==='drive'&&state.nav.junction)return; // modal: no toast clutter
  let ty=68;
  for(const tt of state.toasts){
    const a=clamp(tt.t,0,1);
    const tw2=ctx.measureText(tt.msg).width+20;
    ctx.fillStyle=`rgba(30,22,38,${0.9*a})`;
    ctx.fillRect(NW/2-tw2/2,ty,tw2,22);
    ctx.fillStyle=`rgba(244,226,198,${a})`;
    ctx.fillText(tt.msg,NW/2-tw2/2+10,ty+4);
    ty+=26;
  }
}

// ---------- main loop ----------
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000);last=now;
  update(dt);
  // world at 2x transform (HD hybrid), post-fx + UI at native res
  ctx.save();ctx.scale(2,2);
  let lights;
  if(state.scene==='interior')lights=renderInterior(now/1000);
  else lights=renderDrive(now/1000);
  ctx.restore();
  applyLighting(lights||[]);
  // ── Kingdom water reflection (mirrors the whole scene) ──
  {
    const WLn=WL*2;
    ctx.save();ctx.globalAlpha=0.35;
    ctx.drawImage(cv,0,WLn-112,NW,112,0,WLn+112,NW,-112);
    ctx.restore();
    const dkw=darkness();
    ctx.fillStyle=`rgba(14,30,50,${0.42+dkw*0.2})`;ctx.fillRect(0,WLn,NW,NH-WLn);
    ctx.fillStyle='rgba(190,220,240,0.16)';
    const trv=state.drive.trav;
    for(let i=0;i<24;i++){
      const rx=(((i*61+13-trv*0.5)%NW)+NW)%NW, ry=WLn+5+(i*23)%(NH-WLn-8);
      ctx.fillRect(Math.round(rx),Math.round(ry),10+(i*7)%16,1);
    }
    ctx.fillStyle='rgba(225,242,250,0.30)';ctx.fillRect(0,WLn,NW,1);
  }
  if(state.map)renderMapScreen();
  drawUI(now/1000);
  sctx.fillStyle='#14101e';sctx.fillRect(0,0,screenCv.width,screenCv.height);
  const sh=state.scene==='drive'?state.drive.shake:0;
  const ox=sh>0?Math.round((Math.random()-0.5)*sh*10)*SCALE:0;
  const oy=sh>0?Math.round((Math.random()-0.5)*sh*7)*SCALE:0;
  sctx.drawImage(cv,ox,oy,NW*SCALE,NH*SCALE);
}
function loop(now){frame(now);requestAnimationFrame(loop)}
requestAnimationFrame(loop);
window.__state=state; window.__keys=keys;
</script>
